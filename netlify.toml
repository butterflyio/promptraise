[build]
  command = "npm run build"
  publish = ".next"
  functions = "functions"

[dev]
  command = "npm run dev"
  port = 3000
  targetPort = 3000

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  node_bundler = "esbuild"
  included_files = ["src/lib/**"]

[build.environment]
  NODE_VERSION = "18"
